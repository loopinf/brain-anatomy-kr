<svg class="circuit-diagram" viewBox="0 0 720 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Entorhinal cortex 미니 도식">
  <defs><marker id="ec-a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L10,5 L0,10 z" fill="#b15c40"/></marker></defs>
  <g class="cd-box cd-input" transform="translate(20,80)"><rect width="160" height="60" rx="8"/><text class="cd-label" x="80" y="24">신피질</text><text class="cd-sublabel" x="80" y="42">감각·연합 정보</text></g>

  <path class="cd-arrow" d="M 460,80 L 520,65" marker-end="url(#ec-a)"/>
