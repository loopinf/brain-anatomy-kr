{%- comment -%}
  Hypothalamus region overview — sits below thalamus, above pituitary,
  contains 4 main nuclei (VMH/LH/ARC/PVN). Park Mun-ho-style.
{%- endcomment -%}
<svg class="circuit-diagram" viewBox="0 0 820 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="시상하부 구조 도식">
  <defs>
    <marker id="hypo-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b15c40"/>
    </marker>
  </defs>

  <text class="cd-section" x="20" y="24">시상하부 구조 — 위치와 안에 사는 핵들</text>

  <!-- Thalamus (above) -->
  <g class="cd-box cd-region" transform="translate(280,50)">
    <rect width="240" height="50" rx="8"/>
    <text class="cd-label" x="120" y="22">시상 (Thalamus)</text>
    <text class="cd-sublabel" x="120" y="38">위에 자리 — 감각 환승역</text>
  </g>

  <!-- Hypothalamus container with 4 nuclei inside -->
  <g class="cd-box cd-region" transform="translate(170,130)">
    <rect width="460" height="120" rx="10" stroke-width="2"/>
    <text class="cd-section" x="20" y="22">시상하부 (Hypothalamus)</text>
  </g>

  <!-- Inner nuclei -->
  <g class="cd-box cd-nucleus" transform="translate(190,160)">
    <rect width="100" height="78" rx="6"/>
    <text class="cd-label" x="50" y="22">ARC</text>
    <text class="cd-sublabel" x="50" y="40">활꼴핵</text>
    <text class="cd-sublabel" x="50" y="56">호르몬</text>
    <text class="cd-sublabel" x="50" y="68">감지 허브</text>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(300,160)">
    <rect width="100" height="78" rx="6"/>
    <text class="cd-label" x="50" y="22">VMH</text>
    <text class="cd-sublabel" x="50" y="40">복내측</text>
    <text class="cd-sublabel" x="50" y="58">포만 중추</text>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(410,160)">
    <rect width="100" height="78" rx="6"/>
    <text class="cd-label" x="50" y="22">LH</text>
    <text class="cd-sublabel" x="50" y="40">외측</text>
    <text class="cd-sublabel" x="50" y="58">섭식 중추</text>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(520,160)">
    <rect width="100" height="78" rx="6"/>
    <text class="cd-label" x="50" y="22">PVN</text>
    <text class="cd-sublabel" x="50" y="40">실방핵</text>
    <text class="cd-sublabel" x="50" y="58">자율·내분비</text>
    <text class="cd-sublabel" x="50" y="70">출력</text>
  </g>

  <!-- Pituitary (below, hanging) -->
  <line x1="400" y1="250" x2="400" y2="285" stroke="#5a4a3a" stroke-width="2"/>
  <g class="cd-box cd-region" transform="translate(280,285)">
    <rect width="240" height="50" rx="8"/>
    <text class="cd-label" x="120" y="22">뇌하수체 (Pituitary)</text>
    <text class="cd-sublabel" x="120" y="38">아래에 매달림 — 호르몬 출력</text>
  </g>

  <!-- Output: Body-wide hormones / autonomic -->
  <g class="cd-box cd-output" transform="translate(610,285)">
    <rect width="190" height="50" rx="8"/>
    <text class="cd-label" x="95" y="22">전신 호르몬·자율신경</text>
    <text class="cd-sublabel" x="95" y="38">체온·식욕·수면·HPA</text>
  </g>

  <!-- Connections -->
  <path class="cd-arrow-modulate" d="M 400,100 L 400,130" marker-end="url(#hypo-arr)"/>
  <text class="cd-edge cd-edge-sub" x="430" y="118">위치 관계</text>

  <path class="cd-arrow" d="M 520,310 L 610,310" marker-end="url(#hypo-arr)"/>

  <!-- Side note about TMN/histamine -->
  <g class="cd-box cd-molecule" transform="translate(20,160)">
    <rect width="130" height="78" rx="6"/>
    <text class="cd-label" x="65" y="22">TMN</text>
    <text class="cd-sublabel" x="65" y="40">결절유두체핵</text>
    <text class="cd-sublabel" x="65" y="58">히스타민 →</text>
    <text class="cd-sublabel" x="65" y="70">각성</text>
  </g>
</svg>
