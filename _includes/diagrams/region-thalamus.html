{%- comment -%}
  Thalamus region overview — sensory relay to specific cortices,
  with hypothalamus below, "all senses except smell route through me".
{%- endcomment -%}
<svg class="circuit-diagram" viewBox="0 0 820 340" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="시상 구조 도식">
  <defs>
    <marker id="thal-arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b15c40"/>
    </marker>
  </defs>

  <text class="cd-section" x="20" y="24">시상 — 후각 빼고 모든 감각의 환승역</text>

  <!-- Sensory inputs (left column) -->
  <g class="cd-box cd-input" transform="translate(20,60)">
    <rect width="160" height="40" rx="6"/>
    <text class="cd-label" x="80" y="22">시각 입력</text>
  </g>
  <g class="cd-box cd-input" transform="translate(20,110)">
    <rect width="160" height="40" rx="6"/>
    <text class="cd-label" x="80" y="22">청각 입력</text>
  </g>
  <g class="cd-box cd-input" transform="translate(20,160)">
    <rect width="160" height="40" rx="6"/>
    <text class="cd-label" x="80" y="22">체성감각 입력</text>
  </g>
  <g class="cd-box cd-input" transform="translate(20,210)">
    <rect width="160" height="40" rx="6"/>
    <text class="cd-label" x="80" y="22">통각 (STT)</text>
  </g>

  <!-- Thalamus center -->
  <g class="cd-box cd-region" transform="translate(280,60)">
    <rect width="220" height="200" rx="10" stroke-width="2"/>
    <text class="cd-section" x="20" y="22">시상 (Thalamus)</text>
    <line x1="20" y1="32" x2="200" y2="32" stroke="#a99959" stroke-width="0.6"/>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(300,90)">
    <rect width="180" height="36" rx="6"/>
    <text class="cd-sublabel" x="90" y="22" font-weight="600" fill="#2c2b29">LGN · 시각 → V1</text>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(300,134)">
    <rect width="180" height="36" rx="6"/>
    <text class="cd-sublabel" x="90" y="22" font-weight="600" fill="#2c2b29">MGN · 청각 → 측두</text>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(300,178)">
    <rect width="180" height="36" rx="6"/>
    <text class="cd-sublabel" x="90" y="22" font-weight="600" fill="#2c2b29">VPL/VPM · 체성·통각 → S1</text>
  </g>
  <g class="cd-box cd-nucleus" transform="translate(300,222)">
    <rect width="180" height="36" rx="6"/>
    <text class="cd-sublabel" x="90" y="22" font-weight="600" fill="#2c2b29">내측핵 · 통증 정서 → ACC</text>
  </g>

  <!-- Cortices (right) -->
  <g class="cd-box cd-output" transform="translate(580,80)">
    <rect width="220" height="150" rx="8"/>
    <text class="cd-label" x="110" y="24">대뇌피질</text>
    <text class="cd-sublabel" x="110" y="44">V1 (시각)</text>
    <text class="cd-sublabel" x="110" y="62">청각피질 (측두)</text>
    <text class="cd-sublabel" x="110" y="80">S1 (체성)</text>
    <text class="cd-sublabel" x="110" y="98">ACC · Insula (정서)</text>
    <text class="cd-sublabel" x="110" y="124">→ 의식 / 인지</text>
  </g>

  <!-- Hypothalamus below -->
  <g class="cd-box cd-region" transform="translate(280,290)">
    <rect width="220" height="40" rx="8"/>
    <text class="cd-label" x="110" y="22">시상하부 (아래)</text>
  </g>

  <!-- Edges: senses -> thalamus -->
  <path class="cd-arrow" d="M 180,80 L 300,108" marker-end="url(#thal-arr)"/>
  <path class="cd-arrow" d="M 180,130 L 300,152" marker-end="url(#thal-arr)"/>
  <path class="cd-arrow" d="M 180,180 L 300,196" marker-end="url(#thal-arr)"/>
  <path class="cd-arrow" d="M 180,230 L 300,240" marker-end="url(#thal-arr)"/>

  <!-- Thalamus -> cortex -->
  <path class="cd-arrow" d="M 480,108 L 580,108" marker-end="url(#thal-arr)"/>
  <path class="cd-arrow" d="M 480,152 L 580,140" marker-end="url(#thal-arr)"/>
  <path class="cd-arrow" d="M 480,196 L 580,170" marker-end="url(#thal-arr)"/>
  <path class="cd-arrow" d="M 480,240 L 580,200" marker-end="url(#thal-arr)"/>

  <!-- Smell exception note -->
  <g class="cd-box cd-input" transform="translate(580,250)">
    <rect width="220" height="42" rx="8" stroke-dasharray="3 3"/>
    <text class="cd-sublabel" x="110" y="20" font-style="italic">예외: 후각</text>
    <text class="cd-sublabel" x="110" y="34">시상 거치지 않고 측두엽 직행</text>
  </g>
</svg>
