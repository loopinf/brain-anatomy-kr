<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>뇌 구조 학습 · Brain Anatomy</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', 'Noto Sans KR', 'Segoe UI', sans-serif;
  background: #faf8f3;
  color: #1e1e1e;
  margin: 0;
  padding: 20px;
  line-height: 1.55;
}
.wrap { max-width: 1180px; margin: 0 auto; }
header { margin-bottom: 14px; }
h1 { margin: 0 0 4px; font-size: 22px; letter-spacing: -0.01em; }
.subtitle { color: #777; font-size: 13px; }

.tabs { display: flex; gap: 6px; margin: 14px 0 16px; flex-wrap: wrap; }
.tab {
  padding: 8px 14px; border-radius: 999px; border: 1px solid #ddd;
  background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
  transition: all 0.15s;
}
.tab:hover { border-color: #999; }
.tab.active { background: #1e1e1e; color: #fff; border-color: #1e1e1e; }

.view-toggle { display: inline-flex; gap: 0; margin-bottom: 12px; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
.view-toggle button {
  padding: 6px 14px; border: 0; background: #fff; cursor: pointer;
  font-size: 12px; font-weight: 500; color: #555;
}
.view-toggle button.active { background: #2d4a7a; color: #fff; }

/* ---------- Learn mode ---------- */
.learn-grid {
  display: grid; grid-template-columns: 1.3fr 1fr; gap: 20px;
}
@media (max-width: 900px) { .learn-grid { grid-template-columns: 1fr; } }

.brain-box {
  background: #fff; border: 1px solid #e8e4d8; border-radius: 12px;
  padding: 16px; position: relative;
}
.brain-svg { width: 100%; height: auto; display: block; }
.region {
  cursor: pointer;
  transition: opacity 0.15s, stroke-width 0.15s;
  opacity: 0.72;
}
.region:hover { opacity: 1; }
.region.active { opacity: 1; stroke: #1e1e1e; stroke-width: 2.5; }
.label-text {
  font-size: 11px; font-weight: 600; fill: #222; pointer-events: none;
  text-anchor: middle;
}
.label-line { stroke: #333; stroke-width: 1; fill: none; pointer-events: none; }

.info-box {
  background: #fff; border: 1px solid #e8e4d8; border-radius: 12px;
  padding: 20px; min-height: 400px;
}
.info-empty { color: #999; text-align: center; padding: 80px 20px; font-size: 14px; }
.name-en { font-size: 26px; font-weight: 700; letter-spacing: -0.01em; margin: 0; }
.name-kr { font-size: 20px; font-weight: 600; color: #2d4a7a; margin: 4px 0 0; }
.name-hanja { font-size: 16px; color: #999; margin: 2px 0 14px; font-family: 'Noto Serif KR', serif; }
.cat-tag {
  display: inline-block; padding: 3px 9px; background: #f0ece1; border-radius: 6px;
  font-size: 11px; color: #6b5d3e; margin-bottom: 14px;
}
.info-row { margin: 12px 0; }
.info-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: #999; font-weight: 600; margin-bottom: 3px; }
.info-text { font-size: 14px; color: #333; }
.mnemonic {
  background: #fff8e1; border-left: 3px solid #e0b84d; padding: 10px 12px;
  border-radius: 0 6px 6px 0; margin-top: 14px; font-size: 13px;
}

.chip-list { margin-top: 16px; display: flex; flex-wrap: wrap; gap: 6px; }
.chip {
  padding: 5px 10px; background: #fff; border: 1px solid #ddd; border-radius: 999px;
  font-size: 12px; cursor: pointer; transition: all 0.15s;
}
.chip:hover { border-color: #2d4a7a; color: #2d4a7a; }
.chip.active { background: #2d4a7a; color: #fff; border-color: #2d4a7a; }

/* ---------- Flashcard mode ---------- */
.card-wrap { max-width: 640px; margin: 10px auto; }
.card {
  background: #fff; border: 1px solid #e8e4d8; border-radius: 16px;
  padding: 28px; min-height: 440px;
  box-shadow: 0 4px 18px rgba(0,0,0,0.06);
}
.card-front { text-align: center; }
.card-front .mini-brain { max-width: 360px; margin: 0 auto 16px; }
.card-front .hint { color: #888; margin-top: 10px; font-size: 13px; }
.card-actions {
  display: flex; justify-content: space-between; align-items: center;
  max-width: 640px; margin: 14px auto 0;
}
.card-btn {
  padding: 10px 18px; border: 1px solid #ddd; background: #fff;
  border-radius: 8px; cursor: pointer; font-size: 13px; font-weight: 500;
}
.card-btn:hover { border-color: #2d4a7a; color: #2d4a7a; }
.card-btn.primary { background: #1e1e1e; color: #fff; border-color: #1e1e1e; }
.card-progress { color: #888; font-size: 13px; }
.reveal-btn {
  display: block; margin: 20px auto 0;
  padding: 12px 28px; background: #2d4a7a; color: #fff;
  border: 0; border-radius: 999px; cursor: pointer; font-size: 14px; font-weight: 500;
}

/* ---------- Quiz mode ---------- */
.quiz-wrap { max-width: 640px; margin: 10px auto; }
.quiz-card {
  background: #fff; border: 1px solid #e8e4d8; border-radius: 16px;
  padding: 24px;
}
.quiz-q { font-size: 15px; color: #555; margin-bottom: 10px; }
.quiz-target { font-size: 19px; font-weight: 600; margin-bottom: 16px; }
.quiz-options { display: grid; gap: 8px; }
.quiz-opt {
  padding: 12px 14px; border: 1px solid #ddd; background: #fff; border-radius: 8px;
  cursor: pointer; text-align: left; font-size: 14px; transition: all 0.12s;
}
.quiz-opt:hover { border-color: #2d4a7a; }
.quiz-opt.correct { background: #e6f4e6; border-color: #4a9a4a; color: #1e5c1e; }
.quiz-opt.wrong { background: #fbeaea; border-color: #c94a4a; color: #7a2020; }
.quiz-opt:disabled { cursor: default; }
.quiz-next { margin-top: 14px; text-align: center; }
.quiz-score { text-align: center; padding: 40px 20px; font-size: 16px; }
.quiz-score .score-num { font-size: 48px; font-weight: 700; color: #2d4a7a; margin: 10px 0; }

.hidden { display: none !important; }

/* Brain region color palette */
.r-frontal   { fill: #f4b5a2; }
.r-parietal  { fill: #a2c9a8; }
.r-temporal  { fill: #f0d78b; }
.r-occipital { fill: #b8a2d9; }
.r-cerebellum{ fill: #e89bb8; }
.r-brainstem { fill: #c9a98a; }
.r-midbrain  { fill: #d4b896; }
.r-pons      { fill: #b89a78; }
.r-medulla   { fill: #9c7e5e; }
.r-thalamus  { fill: #87b5d4; }
.r-hypothalamus{ fill: #6fa0c2; }
.r-hippocampus{ fill: #e0a868; }
.r-amygdala  { fill: #c94a4a; }
.r-corpus-callosum { fill: #d9d4c4; }
.r-pituitary { fill: #f588a8; }

.region-stroke { stroke: #5a4a3a; stroke-width: 1; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>뇌 구조 학습 · Brain Anatomy Basics</h1>
    <div class="subtitle">영어 · 한국어 · 한자어 함께 익히기 · 핵심 15개 부위</div>
  </header>

  <div class="tabs" id="tabs">
    <button class="tab active" data-mode="learn">학습 모드</button>
    <button class="tab" data-mode="flash">플래시카드</button>
    <button class="tab" data-mode="quiz">퀴즈</button>
  </div>

  <!-- LEARN MODE -->
  <section id="mode-learn">
    <div class="view-toggle">
      <button class="active" data-view="lateral">측면도 (Lateral)</button>
      <button data-view="sagittal">단면도 (Midsagittal)</button>
    </div>

    <div class="learn-grid">
      <div class="brain-box">
        <svg class="brain-svg" id="brainSvgLateral" viewBox="0 0 800 520"></svg>
        <svg class="brain-svg hidden" id="brainSvgSagittal" viewBox="0 0 800 520"></svg>
      </div>
      <div class="info-box" id="infoBox">
        <div class="info-empty">그림에서 부위를 클릭하거나<br>아래 이름을 선택하세요</div>
      </div>
    </div>

    <div class="chip-list" id="chipList"></div>
  </section>

  <!-- FLASHCARD MODE -->
  <section id="mode-flash" class="hidden">
    <div class="card-wrap">
      <div class="card" id="flashCard"></div>
      <div class="card-actions">
        <button class="card-btn" id="prevBtn">← 이전</button>
        <span class="card-progress" id="flashProgress">1 / 15</span>
        <button class="card-btn primary" id="nextBtn">다음 →</button>
      </div>
    </div>
  </section>

  <!-- QUIZ MODE -->
  <section id="mode-quiz" class="hidden">
    <div class="quiz-wrap">
      <div class="quiz-card" id="quizCard"></div>
    </div>
  </section>
</div>

document.getElementById('brainSvgLateral').innerHTML = LATERAL_SVG;
document.getElementById('brainSvgSagittal').innerHTML = SAGITTAL_SVG;

// ---- STATE ----
let currentMode = 'learn';
let currentView = 'lateral';
let selectedId = null;
let flashIdx = 0;

// ---- LEARN MODE ----
function renderInfo(id) {
  const item = DATA.find(d => d.id === id);
  const box = document.getElementById('infoBox');
  if (!item) {
    box.innerHTML = '<div class="info-empty">그림에서 부위를 클릭하거나<br>아래 이름을 선택하세요</div>';
    return;
  }
  box.innerHTML = `
    <div class="cat-tag">${item.category}</div>
    <h2 class="name-en">${item.en}</h2>
    <div class="name-kr">${item.kr} <span style="color:#999;font-size:15px;font-weight:400">(${item.hanja})</span></div>
    <div class="info-row">
      <div class="info-label">📍 위치 · Location</div>
      <div class="info-text">${item.location}</div>
    </div>
    <div class="info-row">
      <div class="info-label">⚙️ 기능 · Function</div>
      <div class="info-text">${item.function}</div>
    </div>
    <div class="info-row">
      <div class="info-label">🔤 한자 풀이 · Etymology</div>
      <div class="info-text" style="color:#666">${item.etymology}</div>
    </div>
    <div class="mnemonic">💡 ${item.mnemonic}</div>
  `;
}
function selectRegion(id) {
  selectedId = id;
  document.querySelectorAll('.region').forEach(el => el.classList.remove('active'));
  document.querySelectorAll(`.region[data-id="${id}"]`).forEach(el => el.classList.add('active'));
  document.querySelectorAll('.chip').forEach(el => el.classList.toggle('active', el.dataset.id === id));
  renderInfo(id);
  // Auto-switch view if needed
  const item = DATA.find(d => d.id === id);
  if (item && item.view !== 'both') {
    if (item.view !== currentView) setView(item.view);
  }
}
document.querySelectorAll('.region').forEach(el => {
  el.addEventListener('click', () => selectRegion(el.dataset.id));
});
function renderChips() {
  const list = document.getElementById('chipList');
  list.innerHTML = DATA.map(d =>
    `<div class="chip" data-id="${d.id}">${d.kr} · ${d.en}</div>`
  ).join('');
  list.querySelectorAll('.chip').forEach(c => {
    c.addEventListener('click', () => selectRegion(c.dataset.id));
  });
}
renderChips();

function setView(view) {
  currentView = view;
  document.querySelectorAll('.view-toggle button').forEach(b =>
    b.classList.toggle('active', b.dataset.view === view));
  document.getElementById('brainSvgLateral').classList.toggle('hidden', view !== 'lateral');
  document.getElementById('brainSvgSagittal').classList.toggle('hidden', view !== 'sagittal');
}
document.querySelectorAll('.view-toggle button').forEach(b => {
  b.addEventListener('click', () => setView(b.dataset.view));
});

// ---- TABS ----
document.querySelectorAll('#tabs .tab').forEach(t => {
  t.addEventListener('click', () => {
    currentMode = t.dataset.mode;
    document.querySelectorAll('#tabs .tab').forEach(x => x.classList.toggle('active', x === t));
    document.getElementById('mode-learn').classList.toggle('hidden', currentMode !== 'learn');
    document.getElementById('mode-flash').classList.toggle('hidden', currentMode !== 'flash');
    document.getElementById('mode-quiz').classList.toggle('hidden', currentMode !== 'quiz');
    if (currentMode === 'flash') renderFlash();
    if (currentMode === 'quiz') startQuiz();
  });
});

// ---- FLASHCARD MODE ----
let flashRevealed = false;
function renderFlash() {
  const item = DATA[flashIdx];
  const card = document.getElementById('flashCard');
  document.getElementById('flashProgress').textContent = `${flashIdx+1} / ${DATA.length}`;
  if (!flashRevealed) {
    card.innerHTML = `
      <div class="card-front">
        <div class="cat-tag">${item.category}</div>
        <div style="margin:30px 0;font-size:14px;color:#888">이 부위의 이름을 영어·한국어·한자로 말해보세요</div>
        <svg viewBox="0 0 800 520" class="mini-brain" style="max-height:280px">
          ${item.view === 'lateral' ? LATERAL_SVG : SAGITTAL_SVG}
        </svg>
        <div class="hint">↑ 강조된 부위에 집중</div>
        <button class="reveal-btn" onclick="revealFlash()">정답 보기</button>
      </div>
    `;
    // highlight the target region in the embedded SVG
    setTimeout(() => {
      card.querySelectorAll('.region').forEach(el => {
        el.style.opacity = '0.2';
        el.style.pointerEvents = 'none';
      });
      card.querySelectorAll(`.region[data-id="${item.id}"]`).forEach(el => {
        el.style.opacity = '1';
        el.setAttribute('stroke', '#c94a4a');
        el.setAttribute('stroke-width', '3');
      });
    }, 20);
  } else {
    card.innerHTML = `
      <div class="cat-tag">${item.category}</div>
      <h2 class="name-en">${item.en}</h2>
      <div class="name-kr">${item.kr} <span style="color:#999;font-size:15px;font-weight:400">(${item.hanja})</span></div>
      <div class="info-row"><div class="info-label">📍 위치</div><div class="info-text">${item.location}</div></div>
      <div class="info-row"><div class="info-label">⚙️ 기능</div><div class="info-text">${item.function}</div></div>
      <div class="info-row"><div class="info-label">🔤 한자 풀이</div><div class="info-text" style="color:#666">${item.etymology}</div></div>
      <div class="mnemonic">💡 ${item.mnemonic}</div>
    `;
  }
}
function revealFlash() { flashRevealed = true; renderFlash(); }
document.getElementById('prevBtn').addEventListener('click', () => {
  flashIdx = (flashIdx - 1 + DATA.length) % DATA.length;
  flashRevealed = false; renderFlash();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  flashIdx = (flashIdx + 1) % DATA.length;
  flashRevealed = false; renderFlash();
});
window.revealFlash = revealFlash;

// ---- QUIZ MODE ----
let quizIdx = 0, quizScore = 0, quizOrder = [], quizAnswered = false;
function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }
function startQuiz() {
  quizIdx = 0; quizScore = 0; quizOrder = shuffle(DATA).slice(0, 10); quizAnswered = false;
  renderQuiz();
}
function renderQuiz() {
  const card = document.getElementById('quizCard');
  if (quizIdx >= quizOrder.length) {
    card.innerHTML = `
      <div class="quiz-score">
        <div>퀴즈 완료!</div>
        <div class="score-num">${quizScore} / ${quizOrder.length}</div>
        <div style="color:#777;margin-bottom:20px">${quizScore === quizOrder.length ? '완벽! 🎉' : quizScore >= 7 ? '잘했어요! 👍' : '다시 복습해볼까요?'}</div>
        <button class="card-btn primary" onclick="startQuiz()">다시 시작</button>
      </div>`;
    return;
  }
  const q = quizOrder[quizIdx];
  // build 4 options: 1 correct + 3 distractors
  const distractors = shuffle(DATA.filter(d => d.id !== q.id)).slice(0, 3);
  const opts = shuffle([q, ...distractors]);
  // Question: show SVG with highlight + ask name
  card.innerHTML = `
    <div class="quiz-q">Q${quizIdx+1}. 강조된 부위의 이름은? (${quizIdx+1}/${quizOrder.length}, 점수 ${quizScore})</div>
    <svg viewBox="0 0 800 520" style="width:100%;max-height:260px;display:block;margin-bottom:14px">
      ${q.view === 'lateral' ? LATERAL_SVG : SAGITTAL_SVG}
    </svg>
    <div class="quiz-options">
      ${opts.map(o => `<button class="quiz-opt" data-correct="${o.id===q.id}" data-id="${o.id}">${o.en} · ${o.kr} (${o.hanja})</button>`).join('')}
    </div>
    <div class="quiz-next hidden" id="quizNextWrap">
      <div id="quizFeedback" style="margin-bottom:10px;font-size:13px"></div>
      <button class="card-btn primary" onclick="nextQuiz()">다음 문제 →</button>
    </div>
  `;
  // highlight target
  setTimeout(() => {
    card.querySelectorAll('.region').forEach(el => { el.style.opacity='0.2'; el.style.pointerEvents='none'; });
    card.querySelectorAll(`.region[data-id="${q.id}"]`).forEach(el => {
      el.style.opacity='1'; el.setAttribute('stroke','#c94a4a'); el.setAttribute('stroke-width','3');
    });
  }, 20);
  card.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', () => {
      if (quizAnswered) return;
      quizAnswered = true;
      const correct = btn.dataset.correct === 'true';
      if (correct) { btn.classList.add('correct'); quizScore++; }
      else {
        btn.classList.add('wrong');
        card.querySelector(`.quiz-opt[data-id="${q.id}"]`).classList.add('correct');
      }
      card.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
      document.getElementById('quizNextWrap').classList.remove('hidden');
      document.getElementById('quizFeedback').innerHTML = correct
        ? `<span style="color:#4a9a4a">✓ 정답!</span> ${q.mnemonic}`
        : `<span style="color:#c94a4a">✗ 정답은 <b>${q.en} · ${q.kr}</b></span><br><span style="color:#666">${q.mnemonic}</span>`;
    });
  });
}
function nextQuiz() { quizIdx++; quizAnswered=false; renderQuiz(); }
window.startQuiz = startQuiz;
window.nextQuiz = nextQuiz;
</script>
</body>
</html>
